<section class="experience-section">
  <div class="container">
    <div class="section-header" appScrollReveal>
      <h2 class="section-title">Work <span class="gradient-text">Experience</span></h2>
      <p class="section-subtitle">My professional journey and career milestones.</p>
    </div>

    <div class="timeline">
      @for (exp of experiences; track exp.period; let i = $index) {
        <div class="timeline-item" [class.right]="i % 2 !== 0" appScrollReveal>
          <div class="timeline-connector">
            <div class="timeline-dot"></div>
            <div class="timeline-line"></div>
          </div>

          <div class="timeline-card">
            <div class="card-header">
              <span class="card-period">{{ exp.period }}</span>
              <span class="card-type">{{ exp.type }}</span>
            </div>
            <h3 class="card-title">{{ exp.title }}</h3>
            <p class="card-company">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
              {{ exp.company }}
            </p>
            <ul class="card-highlights">
              @for (highlight of exp.highlights; track highlight) {
                <li>{{ highlight }}</li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>
</section>
